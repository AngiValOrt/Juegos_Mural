<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Trivia Mundial 2026</title>

    <style>
        /* Configuramos el fondo de la pantalla y centramos todo el texto */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            text-align: center;
            padding: 50px;
        }

        /* Diseñamos el cuadro blanco donde flotará el juego */
        .tarjeta {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: inline-block;
            max-width: 500px;
            width: 100%;
        }

        /* Le damos un estilo grande y llamativo a los botones de respuestas */
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 80%;
        }

        /* Hace que el botón cambie de azul a un tono más oscuro cuando pasas el mouse por encima */
        button:hover {
            background-color: #0056b3;
        }

        /* Estilo para el texto que dice "¡Correcto!" o "Incorrecto" */
        #resultado {
            font-weight: bold;
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="tarjeta">
        <h1>🏆 Trivia Mundial 2026 🏆</h1>

        <div id="contenedor-trivia">
            <h3 id="texto-pregunta">Cargando pregunta...</h3>

            <div id="opciones-botones"></div>

            <p id="resultado"></p>
        </div>
    </div>

    <script>
        // Creamos una caja vacía para guardar las preguntas que nos mande Python
        let preguntas = [];

        // El número de la pregunta en la que va jugando el usuario (empezamos en la cero)
        let indiceActual = 0;

        // Guardamos cuántas respuestas correctas va logrando el jugador
        let puntaje = 0;

        // fetch va a tocar la puerta de la ruta secreta de Python para pedir las preguntas
        fetch('/obtener_preguntas')
            // Cuando Python responde, transformamos esa respuesta en datos fáciles de leer
            .then(respuesta => respuesta.json())
            // Con los datos listos, los metemos a nuestro juego
            .then(datos => {
                // Guardamos la lista completa de preguntas que envió Python
                preguntas = datos;
                // Llamamos a la función mágica para pintar la primera pregunta en la pantalla
                mostrarPregunta();
            });

        // Esta función dibuja la pregunta actual y sus opciones en la página web
        function mostrarPregunta() {
            // Revisamos si el jugador ya contestó todas las preguntas disponibles
            if (indiceActual >= preguntas.length) {
                // Si terminó el juego, borramos todo lo de la tarjeta y escribimos su felicitación final
                document.getElementById('contenedor-trivia').innerHTML = `
                    <h2>¡Terminaste! 🎉</h2>
                    <p>Tu puntaje final es: <strong>${puntaje} de ${preguntas.length}</strong></p>
                    <p><a href="/memorama">¡Haz clic aquí para ir al juego de Memorama! 🧠</a></p>
                `;
                // Ponemos un candado (return) para que la función se detenga aquí y no busque más
                return;
            }

            // Seleccionamos la pregunta exacta que corresponde jugar usando el número del índice actual
            let preguntaActual = preguntas[indiceActual];

            // Reemplazamos el texto "Cargando..." por la pregunta real del Mundial
            document.getElementById('texto-pregunta').innerText = preguntaActual.pregunta;

            // Limpiamos la pantalla borrando el letrero de correcto/incorrecto del turno pasado
            document.getElementById('resultado').innerText = "";

            // Buscamos la zona de la pantalla donde deben aparecer los botones de opciones
            let contenedorBotones = document.getElementById('opciones-botones');

            // Vaciamos esa zona para borrar los botones viejos de la pregunta anterior
            contenedorBotones.innerHTML = "";

            // Hacemos un recorrido rápido por cada una de las opciones que tiene esta pregunta
            preguntaActual.opciones.forEach(opcion => {
                // Creamos un elemento botón nuevecito en la memoria de la página
                let boton = document.createElement('button');

                // Le escribimos el texto de la opción al botón (Ej: "3 países")
                boton.innerText = opcion;

                // Le ordenamos al botón que si el usuario le da un clic, revise si esa es la opción correcta
                boton.onclick = () => verificarRespuesta(opcion, preguntaActual.correcta);

                // Pegamos físicamente el botón dentro del contenedor en la pantalla para que se pueda ver
                contenedorBotones.appendChild(boton);
            });
        }

        // Esta función verifica si la opción que eligió el jugador es la acertada
        function verificarRespuesta(elegida, correcta) {
            // Buscamos la zona de texto donde pondremos el resultado del clic
            let textoResultado = document.getElementById('resultado');

            // Preguntamos: ¿La opción que presionó el usuario es igualita a la respuesta correcta?
            if (elegida === correcta) {
                // Escribimos un letrero feliz de éxito
                textoResultado.innerText = "¡Correcto! 🌟";
                // Pintamos las letras de color verde alegre
                textoResultado.style.color = "green";
                // Le regalamos un punto más al marcador del jugador
                puntaje++;
            } else {
                // Si se equivocó, le avisamos y además le mostramos cuál era la buena
                textoResultado.innerText = `Incorrecto ❌ La respuesta era: ${correcta}`;
                // Pintamos las letras de color rojo para alertarlo
                textoResultado.style.color = "red";
            }

            // Usamos una pausa de tiempo para que el usuario alcance a leer el resultado
            setTimeout(() => {
                // Le sumamos uno al contador para avanzar a la siguiente pregunta de la lista
                indiceActual++;
                // Volvemos a llamar a la función para actualizar la pantalla con el nuevo reto
                mostrarPregunta();
            }, 2000); // 2000 milisegundos significan que se esperará exactamente 2 segundos
        }
    </script>
</body>

</html>
